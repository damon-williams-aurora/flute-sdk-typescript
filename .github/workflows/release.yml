name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Disable husky in CI: hooks (lint-staged + commitlint) run locally on
# pre-commit / commit-msg, and at PR time via the CI workflow. They must
# stay out of the way of changesets/action, which crafts a non-Conventional
# "Version Packages" commit that would otherwise fail commitlint.
env:
  HUSKY: 0

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance + Trusted Publisher OIDC

jobs:
  release:
    name: Version & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Use Node 24 here (not the Node 22 the rest of CI uses). The npm CLI
      # bundled with Node 22 (currently 11.6.0) hits npm/cli#9088 — Trusted
      # Publisher OIDC publishes fail with a misleading
      #   E404 PUT https://registry.npmjs.org/@scope%2Fpkg
      # even though the trusted-publisher config is correct, the package
      # exists, and `id-token: write` is granted. The fix confirmed by the
      # upstream issue is to run on a CLI >= 11.6.2, which Node 24 ships.
      # We pin only the release runner; CI matrix stays on 20/22/24 to keep
      # broad version coverage for tests.
      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Print npm version (Trusted Publisher requires >= 11.6.2 — see npm/cli#9088)
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint • typecheck • test • build)
        run: npm run verify

      # Authenticates to npm via OIDC (Trusted Publisher), not a long-lived
      # token. The publisher is registered at the package level on npm:
      # https://www.npmjs.com/package/@getflute/sdk/access
      # Org: getflute · Repo: flute-sdk-typescript · Workflow: release.yml
      # As long as those three match, npm accepts the publish + provenance
      # attestation produced by `id-token: write` above.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
